<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeroBalance | Interactive Liquid Glass</title>
    <style>
        :root {
            /* Liquid Glass Variables - Updated per your request */
            --glass-bg: rgba(255, 255, 255, 0.05); 
            --glass-blur: blur(700px); 
            
            /* Edge lighting */
            --glass-border-top: rgba(255, 255, 255, 0.3); 
            --glass-border-left: rgba(255, 255, 255, 0.2);
            --glass-border-right: rgba(255, 255, 255, 0.05);
            --glass-border-bottom: rgba(255, 255, 255, 0.05);
            
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5); 
            
            /* Colors */
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.6);
            --accent-green: #2ecc71;
            --btn-glass: rgba(255, 255, 255, 0.05);
            --btn-hover: rgba(255, 255, 255, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            text-transform: uppercase;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            background-color: #080c17; 
            overflow: hidden; 
            position: relative;
        }

        /* --- BACKGROUND GLOWING ORBS --- */
        .orb {
            position: absolute;
            top: 0; 
            left: 0;
            border-radius: 50%;
            filter: blur(90px); 
            z-index: -1;
        }

        .orb-1 { width: 450px; height: 450px; background-color: #0fb9b1; }
        .orb-2 { width: 600px; height: 600px; background-color: #4b6584; }
        .orb-3 { width: 350px; height: 350px; background-color: #2bcbba; opacity: 0.6; }

        /* --- THE LIQUID GLASS PANEL --- */
        .panel-container {
            width: 100%;
            max-width: 900px; 
            height: 500px; 
            
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur); 
            
            border-top: 1px solid var(--glass-border-top);
            border-left: 1px solid var(--glass-border-left);
            border-right: 1px solid var(--glass-border-right);
            border-bottom: 1px solid var(--glass-border-bottom);
            
            border-radius: 24px;
            box-shadow: var(--glass-shadow);
            
            display: flex;
            flex-direction: column;
            z-index: 1; 
        }

        .button-bar {
            padding: 25px;
            display: flex;
            justify-content: space-between; 
            align-items: flex-start;
            flex-wrap: wrap; 
        }

        .button {
            display: flex;
            flex-direction: column; 
            justify-content: center;
            align-items: center;
            background: var(--btn-glass);
            border-top: 1px solid rgba(255,255,255,0.4);
            border-left: 1px solid rgba(255,255,255,0.2);
            border-bottom: 1px solid transparent;
            border-right: 1px solid transparent;
            backdrop-filter: blur(4px);
            color: var(--text-main);
            border-radius: 12px; 
            padding: 10px 15px;
            font-size: 14px;
            font-weight: bold;
            text-align: center;
            width: 130px; 
            height: 60px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: all 0.3s ease; 
            cursor: pointer;
            margin-bottom: 10px; 
        }

        .button span { display: block; width: 100%; text-align: center; }
        .button-large-text { font-size: 16px; }
        .button-two-line { display: block; height: 80px; line-height: 1.3; }

        .button:hover {
            background: var(--btn-hover);
            transform: translateY(-2px); 
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2); 
            border-top: 1px solid rgba(255,255,255,0.6);
        }

        .status-bar {
            display: flex;
            justify-content: flex-start; 
            align-items: center;
            background: rgba(0, 0, 0, 0.15);
            border-top: 1px solid rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1); 
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
            padding: 10px 25px;
            height: 60px;
            color: var(--text-main);
            font-size: 14px;
            font-weight: 600;
        }

        .status-box {
            border: 1px solid rgba(255, 255, 255, 0.2); 
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 15px; 
            padding: 0 15px;
            height: 36px;
            background: rgba(255, 255, 255, 0.05); 
        }

        .connected-box {
            width: 140px; 
            color: var(--accent-green); 
            text-shadow: 0 0 10px rgba(46, 204, 113, 0.5); 
            border-color: rgba(46, 204, 113, 0.4); 
            background: rgba(46, 204, 113, 0.05);
        }

        .strength-box { width: 110px; }
        
        .strength-meter-box {
            width: 160px; 
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            height: 36px;
            background: rgba(0,0,0,0.1); 
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2); 
        }

        .main-display {
            flex-grow: 1; 
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: var(--text-dim);
            font-size: 22px;
            text-transform: none; 
            letter-spacing: 3px;
        }
    </style>
</head>
<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="panel-container">
        <div class="button-bar">
            <div class="button button-large-text button-two-line"><span>BALANCE ON</span><span>/ OFF</span></div>
            <div class="button">JOYSTICK</div>
            <div class="button">GYROSCOPE</div>
            <div class="button">ARROW BUTTON</div>
            <div class="button">STEERING SLIDER</div>
            <div class="button button-large-text button-two-line"><span>AUTOMATIC</span><span>/ SELF DRIVING</span></div>
        </div>

        <div class="status-bar">
            <div class="status-box connected-box">CONNECTED</div>
            <div class="status-box strength-box">SIGNAL STRENGTH</div>
            <div class="strength-meter-box"></div> 
        </div>

        <div class="main-display">
            <h3>(SYSTEM STANDBY)</h3>
        </div>
    </div>

    <script>
        const orbs = [
            { el: document.querySelector('.orb-1'), x: 0, y: 0, speed: 0.02, offsetX: 0, offsetY: 0 },
            { el: document.querySelector('.orb-2'), x: 0, y: 0, speed: 0.015, offsetX: 300, offsetY: -200 },
            { el: document.querySelector('.orb-3'), x: 0, y: 0, speed: 0.035, offsetX: -250, offsetY: 150 }
        ];

        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;

        // 1. Desktop: Listen for mouse movement
        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        // 2. Mobile: Listen for device tilt (gyroscope/accelerometer)
        window.addEventListener('deviceorientation', (e) => {
            // e.gamma represents left-to-right tilt in degrees
            // e.beta represents front-to-back tilt in degrees
            let tiltX = e.gamma; 
            let tiltY = e.beta;

            if (tiltX !== null && tiltY !== null) {
                // Constrain the tilt from -45 to 45 degrees so you don't have to flip your phone upside down
                let constrainedX = Math.max(-45, Math.min(45, tiltX));
                // Beta usually rests at 45 degrees when holding a phone normally, so we adjust for that
                let constrainedY = Math.max(0, Math.min(90, tiltY)) - 45; 

                // Map the -45 to 45 degree tilt to the width/height of the screen
                mouseX = (window.innerWidth / 2) + (constrainedX / 45) * (window.innerWidth / 2);
                mouseY = (window.innerHeight / 2) + (constrainedY / 45) * (window.innerHeight / 2);
            }
        });

        // Animation Loop
        function animate() {
            orbs.forEach(orb => {
                let targetX = mouseX + orb.offsetX;
                let targetY = mouseY + orb.offsetY;

                orb.x += (targetX - orb.x) * orb.speed;
                orb.y += (targetY - orb.y) * orb.speed;

                orb.el.style.transform = `translate(calc(${orb.x}px - 50%), calc(${orb.y}px - 50%))`;
            });

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
