<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AeroBalance | Modular Control Center</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="panel-container">
        
        <div class="button-bar">
            <div class="button button-large-text button-two-line" id="btn-balance"><span>BALANCE ON</span><span>/ OFF</span></div>
            <div class="button mode-btn" data-mode="JOYSTICK">JOYSTICK</div>
            <div class="button mode-btn" data-mode="GYROSCOPE">GYROSCOPE</div>
            <div class="button mode-btn" data-mode="ARROW BUTTON">ARROW BUTTON</div>
            <div class="button mode-btn" data-mode="STEERING SLIDER">STEERING SLIDER</div>
            <div class="button button-large-text button-two-line" id="btn-auto"><span>AUTOMATIC</span><span>/ SELF DRIVING</span></div>
        </div>

        <div class="status-bar">
            <div class="status-box" id="btn-connect" style="cursor: pointer;">DISCONNECTED</div>
            <div class="combined-strength-box">
                <div class="signal-bar-bg" id="signal-fill"></div>
                <span class="signal-text">SIGNAL STRENGTH</span>
            </div> 
        </div>

        <div class="main-display">
            <h3 id="display-text">(SYSTEM STANDBY)</h3>

            <div id="joystick-zone" class="control-zone">
                <div id="joystick-base"><div id="joystick-knob"></div></div>
                <div id="joystick-output" class="output-text">X: 0 | Y: 0</div>
            </div>

            <div id="arrow-zone" class="control-zone">
                <div class="arrow-grid">
                    <div class="arr-btn" id="btn-up">▲</div>
                    <div class="arr-btn" id="btn-left">◀</div>
                    <div class="arr-btn" id="btn-down">▼</div>
                    <div class="arr-btn" id="btn-right">▶</div>
                </div>
                <div id="arrow-output" class="output-text">X: 0 | Y: 0</div>
            </div>

            <div id="slider-zone" class="control-zone">
                <div class="slider-layout">
                    <div class="speed-display">
                        <div class="speed-label">SPEED</div>
                        <div id="slider-output" class="speed-value">0%</div>
                    </div>
                    <div class="slider-wrapper">
                        <input type="range" id="speed-slider" class="vertical-slider" min="-100" max="100" value="0">
                    </div>
                    <div class="direction-display">
                        <div id="dir-forward" class="dir-box">FORWARD</div>
                        <div id="dir-backward" class="dir-box">BACKWARD</div>
                    </div>
                </div>
            </div>

            <div id="gyro-zone" class="control-zone">
                <div id="gyro-bubble-base"><div id="gyro-bubble"></div></div>
                <div id="gyro-output" class="output-text">X: 0 | Y: 0</div>
            </div>

            <div id="auto-zone" class="control-zone">
                <h2 style="color: var(--accent-green); text-shadow: 0 0 10px var(--accent-glow);">[ SCANNING ENVIRONMENT ]</h2>
                <div id="auto-output" class="output-text">AI CONTROL ENGAGED</div>
            </div>

        </div>

        <div id="connection-overlay" style="display: none;">
            <div class="connection-card">
                <div class="conn-tabs">
                    <div class="conn-tab active" id="tab-wifi">WI-FI</div>
                    <div class="conn-tab" id="tab-ble">BLUETOOTH</div>
                </div>
                
                <div id="content-wifi">
                    <input type="text" id="esp-ip" placeholder="192.168.4.1">
                    <button class="conn-btn" onclick="connectWifi()">CONNECT WI-FI</button>
                </div>
                
                <div id="content-ble" style="display: none;">
                    <button class="conn-btn" onclick="connectBLE()">PAIR DEVICE</button>
                </div>

                <p onclick="toggleOverlay()" style="margin-top: 15px; cursor: pointer; font-size: 11px; opacity: 0.5; font-weight: bold; letter-spacing: 1px;">CLOSE</p>
            </div>
        </div>

    </div>

    <script src="network.js"></script>
   <script src="app.js"></script>
    <script src="controls/joystick.js"></script>
    <script src="controls/arrows.js"></script>
    <script src="controls/slider.js"></script>
    <script src="controls/gyroscope.js"></script>
    <script src="controls/auto.js"></script>
</body>
</html>
