<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#080c17">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="HandheldFriendly" content="true">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="format-detection" content="telephone=no">
    <link rel="apple-touch-icon" href="icon.png">
    <title>AeroBalance | Modular Control Center</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

        <script>
        // Prevent double-tap zoom on mobile
        document.addEventListener('touchstart', function preventZoom(e) {
            if (e.touches.length > 1) {
                e.preventDefault();
            }
        }, { passive: false });
        // Hide address bar on load
        window.addEventListener('load', function() {
            setTimeout(function() {
                window.scrollTo(0, 1);
            }, 0);
        });
        </script>

    <div class="panel-container">
        <div class="button-bar">
            <div class="button button-two-line" id="btn-balance"><span>BALANCE ON</span><span>/ OFF</span></div>
            <div class="button mode-btn" data-mode="JOYSTICK">JOYSTICK</div>
            <div class="button mode-btn" data-mode="GYROSCOPE">GYROSCOPE</div>
            <div class="button mode-btn" data-mode="ARROW BUTTON">ARROWS</div>
            <div class="button mode-btn" data-mode="STEERING SLIDER">SLIDER</div>
            <div class="button button-two-line" id="btn-auto"><span>AUTOMATIC</span><span>/ AI</span></div>
        </div>

        <div class="status-bar">
            <div class="status-box" id="btn-connect" style="cursor: pointer;">DISCONNECTED</div>
            <div class="combined-strength-box">
                <div class="signal-bar-bg" id="signal-fill"></div>
                <span class="signal-text">SIGNAL STRENGTH</span>
            </div>
        </div>

        <div class="main-display">
            <h3 id="display-text">(SYSTEM STANDBY)</h3>

            <div id="joystick-zone" class="control-zone">
                <div id="joystick-base">
                    <div id="joystick-knob"></div>
                </div>
                <div id="joystick-output" class="output-text">X: 0 | Y: 0</div>
            </div>

            <div id="arrow-zone" class="control-zone">
                <div class="arrow-grid">
                    <div class="arr-btn" id="btn-up">▲</div>
                    <div class="arr-btn" id="btn-left">◀</div>
                    <div class="arr-btn" id="btn-down">▼</div>
                    <div class="arr-btn" id="btn-right">▶</div>
                </div>
            </div>

            <div id="slider-zone" class="control-zone">
                <div class="slider-layout">
                    <div class="speed-display">
                        <div id="slider-output" class="speed-value">0%</div>
                    </div>
                    <div class="slider-wrapper">
                        <input type="range" id="speed-slider" class="vertical-slider" min="-100" max="100" value="0">
                    </div>
                    <div class="direction-display">
                        <div id="dir-forward" class="dir-box">FWD</div>
                        <div id="dir-backward" class="dir-box">REV</div>
                    </div>
                </div>
            </div>

            <div id="gyro-zone" class="control-zone">
                <div id="gyro-bubble-base">
                    <div id="gyro-bubble"></div>
                </div>
                <div id="gyro-output" class="output-text">TILT CONTROL</div>
                <button class="button reset-btn" id="btn-gyro-reset" onclick="resetGyroCalibration()" style="height: 40px; width: 150px; font-size: 12px; margin-top: 10px;">SET CENTER</button>
            </div>

            <div id="auto-zone" class="control-zone">
                <h2 style="color: #2ecc71;">AI PILOT ACTIVE</h2>
            </div>
        </div>

        <div id="connection-overlay">
            <div class="connection-card">
                <div class="conn-tabs">
                    <div class="conn-tab active" id="tab-wifi">WI-FI</div>
                    <div class="conn-tab" id="tab-ble">BLUETOOTH</div>
                </div>
                <div id="content-wifi">
                    <input type="text" id="esp-ip" placeholder="192.168.4.1">
                    <button class="conn-btn" onclick="connectWifi()">CONNECT WI-FI</button>
                </div>
                <div id="content-ble" style="display:none;">
                    <button class="conn-btn" onclick="connectBLE()">PAIR DEVICE</button>
                </div>
                <p class="close-overlay-text" onclick="toggleOverlay()"
                    style="margin-top:15px; cursor:pointer; font-size:11px; opacity:0.5; font-weight: bold; letter-spacing: 1px;">
                    CLOSE</p>
            </div>
        </div>
    </div>

    <script src="network.js"></script>
    <script src="app.js"></script>
    <script src="controls/joystick.js"></script>
    <script src="controls/arrows.js"></script>
    <script src="controls/slider.js"></script>
    <script src="controls/gyroscope.js"></script>
    <script src="controls/auto.js"></script>
</body>

</html>
